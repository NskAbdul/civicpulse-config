spring.application.name=grievance-service

server.port=8083

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/grievance_db
spring.datasource.username=postgres
spring.datasource.password=NskAbdul@786

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka

# Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8080/realms/civicpulse
eureka.instance.hostname=localhost
eureka.instance.prefer-ip-address=false

# ==========================
# Kafka Configuration
# ==========================
spring.kafka.bootstrap-servers=localhost:9092

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

spring.kafka.consumer.group-id=grievance-group
spring.kafka.consumer.auto-offset-reset=earliest

spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer